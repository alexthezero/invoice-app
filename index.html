<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>IronNest Pressure Washing Invoice App</title>

  <link rel="stylesheet" href="style.css?v=36" />
  <script src="https://unpkg.com/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>
</head>

<body>
  <div class="app">
    <div class="brand-header">
      <img src="./BAB89AB6-21E7-4651-B1DD-469BD6682619.png?v=1" alt="IronNest Pressure Washing Logo" />
      <h1>IronNest Pressure Washing</h1>
      <p>Professional Pressure Washing Services</p>
    </div>

    <form id="invoiceForm">
      <input id="customerName" placeholder="Customer Name" required />
      <input id="customerAddress" placeholder="Customer Address" />
      <input id="customerPhone" placeholder="Customer Phone" />
      <input id="invoiceDate" type="date" />

      <h3>Services</h3>
      <div id="servicesContainer"></div>

      <button type="button" id="addServiceButton">+ Add Service</button>

      <div class="total-preview">
        Total: $<span id="totalPreview">0.00</span><br />
        Paid: $<span id="paidPreview">0.00</span><br />
        Balance: $<span id="balancePreview">0.00</span>
      </div>

      <label class="status-label">Invoice Status</label>
      <select id="paymentStatus">
        <option value="UNPAID">UNPAID</option>
        <option value="PARTIAL">PARTIAL</option>
        <option value="PAID">PAID</option>
      </select>

      <input id="amountPaid" type="number" step="0.01" min="0" placeholder="Amount Paid" value="0" />

      <h3>Before & After Photos</h3>

      <label class="photo-label">Before Photo</label>
      <input id="beforePhoto" type="file" accept="image/*" />

      <label class="photo-label">After Photo</label>
      <input id="afterPhoto" type="file" accept="image/*" />

      <div class="photo-preview-row">
        <div>
          <p>Before</p>
          <img id="beforePreview" class="photo-preview" />
        </div>
        <div>
          <p>After</p>
          <img id="afterPreview" class="photo-preview" />
        </div>
      </div>

      <h3>Customer Signature</h3>
      <canvas id="signaturePad"></canvas>

      <button type="button" id="clearSignature">Clear Signature</button>
      <button type="submit">Save Invoice</button>
      <button type="button" id="downloadPdf">Download PDF</button>
    </form>

    <h2>Saved Invoices</h2>
    <div id="invoiceList"></div>
  </div>

  <script src="app.js?v=37"></script>
</body>
</html>
